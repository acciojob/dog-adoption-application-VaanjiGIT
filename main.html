<!DOCTYPE html>
<html>
<head>
    <title>Dog Adoption Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        form {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="checkbox"] {
            width: auto;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        label {
            font-weight: bold;
        }
    </style>
</head>

<body>

<form>

    <h2>Dog Adoption Form</h2>

    <!-- Name -->
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Name">

    <!-- Phone -->
    <label for="phone">Phone Number</label>
    <input type="text" id="phone" placeholder="Phone Number">

    <!-- Address -->
    <label for="address">Address</label>
    <input type="text" id="address" placeholder="Address">

    <!-- Checkbox -->
    <label>
        <input type="checkbox" id="checkbox" value="Have you ever lived with a Dog before?">
        Have you ever lived with a Dog before?
    </label>

    <!-- Multi Select -->
    <label for="multiSelect">Please select your preferred breeds</label>
    <select id="multiSelect" multiple>
        <option>Golden Retriever</option>
        <option>Labrador</option>
        <option>German Shepherd</option>
        <option>Pug</option>
    </select>

    <!-- Submit -->
    <input type="submit" id="submit" value="Submit">

</form>

</body>
</html>
